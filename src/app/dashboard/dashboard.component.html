<mat-sidenav-container class="dashboard-container">

  <mat-sidenav
    #sidenav
    [mode]="sidenavMode"
    [opened]="sidenavOpened"
    class="sidenav"
  >
    <div class="sidenav-header">
      <a [routerLink]="['/dashboard']" class="sidenav-brand">
        <span class="sidenav-title">Admin Panel</span>
      </a>
    </div>

    <nav class="sidenav-nav">
      <p class="nav-section-label">Navigation</p>
      <mat-nav-list>
        @for (link of allowedNavLinks(); track link.path) {
          <a
            mat-list-item
            [routerLink]="link.path"
            routerLinkActive="active-link"
            class="nav-item"
          >
            <mat-icon class="nav-icon">{{ link.icon }}</mat-icon>
            <span class="nav-label">{{ link.label }}</span>
          </a>
        }
      </mat-nav-list>
    </nav>
  </mat-sidenav>

  <mat-sidenav-content class="content-area">
    <header class="dash-toolbar">
      <button mat-icon-button (click)="sidenav.toggle()" class="menu-toggle">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">Dashboard</span>
      <span class="toolbar-spacer"></span>
    </header>

    <main class="content-body">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>

</mat-sidenav-container>
